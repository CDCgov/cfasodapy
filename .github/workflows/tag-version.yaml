name: Tag version

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency: tag-version

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          version=$(grep -E '^version' pyproject.toml | head -n 1 | cut -d '"' -f 2)
          if [ -z "$version" ]; then
            echo "No version in package.json, skipping"
            exit 0
          fi
          tag="v$version"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
